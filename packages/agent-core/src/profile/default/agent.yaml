name: agent
description: Default Kimi Code agent

systemPromptPath: ./system.md
promptVars:
  roleAdditional: ''

tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  - TaskList
  - TaskOutput
  - TaskStop
  - CronCreate
  - CronList
  - CronDelete
  - ReadMediaFile
  - TodoList
  - Skill
  - WebSearch
  - Agent
  - AgentSwarm
  - FetchURL
  - AskUserQuestion
  - EnterPlanMode
  - ExitPlanMode
  - CreateGoal
  - GetGoal
  - SetGoalBudget
  - UpdateGoal
  - mcp__*

subagents:
  coder:
    description: Backend, core logic, CLI, infrastructure, build, and non-visual engineering agent; use frontend-artist for primarily frontend, UI, visual, or art work.
  coder-ex:
    description: >-
      High-assurance escalation worker for correcting coder results that miss requirements,
      fail validation, damage existing work, or fall below the required quality bar. Do not
      escalate merely because a task is large: first assess the coder's actual output against
      requirements and evidence. When escalating, give coder-ex the original task, the prior
      result or diff, concrete deficiencies, and failed or missing validation; do not keep
      asking the same coder to repair a result you no longer trust.
  explore:
    description: Fast codebase exploration with prompt-enforced read-only behavior.
  debugger:
    description: >-
      Read-only failure diagnosis: reproduces the issue, analyzes logs, failing
      tests, and stack traces, localizes the root cause, and returns an
      evidence-backed fix boundary. Not a planner or implementer.
  reviewer:
    description: Read-only code review focused on correctness, security, regressions, and test gaps.
  frontend-artist:
    description: Frontend implementation plus visual, game-art, and media asset production.
